# =======================================================
# NAV2 CONFIGURATION (GPS MODE - JAZZY FIXED)
# =======================================================

map_server:
  ros__parameters:
    use_sim_time: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0   # [สำคัญ] MPPI ต้องทำงานเร็ว (แนะนำ 20Hz+)
    odom_topic: "/odom"
    
    # ยังคง Pipeline เดิมไว้: MPPI -> Smoother -> Collision Monitor -> Robot
    cmd_vel_out_topic: "cmd_vel_raw"

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: false

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      
      # --- การตั้งค่า Model และ Sampling (หัวใจของ MPPI) ---
      time_steps: 75             # มองล่วงหน้าไปกี่ก้าว (56 * 0.05 = 2.8 วินาที)
      model_dt: 0.05             # ความละเอียดของเวลาในแต่ละก้าว
      batch_size: 2000           # จำนวนเส้นทางจำลองต่อรอบ (ThinkPad รับไหว)
      vx_std: 0.2                # ความแปรปรวนของการสุ่มความเร็วเดินหน้า
      vy_std: 0.0                # [สำคัญ] หุ่น DiffDrive เดินข้างไม่ได้ ต้องเป็น 0
      wz_std: 0.4                # ความแปรปรวนของการสุ่มการหมุน
      vx_max: 0.75               # ความเร็วสูงสุด (ตามสเปคหุ่น)
      vx_min: 0.0                # ห้ามถอยหลัง (เพื่อความปลอดภัย)
      vy_max: 0.0                # ห้ามเดินข้าง
      wz_max: 1.0                # ความเร็วหมุนสูงสุด
      vx_accel_limits: 0.8
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3           # ค่าความ "กล้า" (ค่าน้อย = เลือกทางที่ดีที่สุดเข้มงวด, ค่ามาก = เฉลี่ยๆ)
      gamma: 0.015
      motion_model: "DiffDrive"  # [สำคัญ] บอก MPPI ว่าหุ่นเราเป็น 2 ล้อ
      visualize: true            # เปิดให้เห็นเส้นสีเขียวๆ ใน Rviz
      retry_attempt_limit: 1
      reset_period: 1.0

      # --- Critics (เกณฑ์การให้คะแนนเส้นทาง) ---
      critics: 
        - "ConstraintCritic"
        - "CostCritic" 
        - "GoalCritic"
        - "GoalAngleCritic" 
        - "PathAlignCritic" 
        - "PathFollowCritic"
        - "PathAngleCritic" 
        - "PreferForwardCritic"

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      CostCritic: # หลบสิ่งกีดขวาง
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        collision_cost: 1000000.0
        consider_footprint: true
        period: 0.25
        near_goal_distance: 1.0

      PathAlignCritic: # เกาะเส้นทาง Global Plan
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 0.785
        mode: 0

      PreferForwardCritic: # ชอบเดินหน้ามากกว่าถอยหลัง/หมุน
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    accel_lim_v: [2.5, 0.0, 3.2]
    decel_lim_v: [-2.5, 0.0, -3.2]

collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      points: "[[0.30, 0.30], [0.30, -0.30], [-0.30, -0.30], [-0.30, 0.30]]"
      action_type: "stop"
      min_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan_corrected"

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# ✅ แก้ไข: ใช้ nav2_behaviors แทน nav2_recoveries (Jazzy)
recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: map
    robot_base_frame: base_footprint
    transform_timeout: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# ✅ แก้ไข: ลบ plugin_lib_names ออก และเพิ่ม error_code_names
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    
    # เพิ่มเพื่อแก้ Warning
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
    
    # ❌ ลบรายการ plugin_lib_names ออกทั้งหมด! (Jazzy โหลดเองแล้ว)

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - recoveries_server
      - velocity_smoother
      - collision_monitor

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - map_server

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: true
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_corrected
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          min_range: 0.3
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.55
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: true
      robot_radius: 0.25
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_corrected
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          min_range: 0.3
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True